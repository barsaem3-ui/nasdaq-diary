<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient (Obsidian Dark Luxury) -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#1b1c25" />
      <stop offset="100%" stop-color="#050609" />
    </radialGradient>

    <!-- SPECULAR GOLD GRADIENTS FOR FACETS -->
    
    <!-- Top Face (Hyper reflective specular gold) -->
    <linearGradient id="gold-top-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF0" />
      <stop offset="20%" stop-color="#FFE082" />
      <stop offset="50%" stop-color="#FFC107" />
      <stop offset="80%" stop-color="#FFA000" />
      <stop offset="100%" stop-color="#E65100" />
    </linearGradient>

    <!-- Front Face (In shadow, darker and warmer metallic) -->
    <linearGradient id="gold-front-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFA000" />
      <stop offset="40%" stop-color="#FF6F00" />
      <stop offset="100%" stop-color="#8D2D00" />
    </linearGradient>

    <!-- Left Face (Medium reflection) -->
    <linearGradient id="gold-left-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F" />
      <stop offset="50%" stop-color="#FF8F00" />
      <stop offset="100%" stop-color="#E65100" />
    </linearGradient>

    <!-- Right Face (Medium-dark reflection) -->
    <linearGradient id="gold-right-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFCA28" />
      <stop offset="60%" stop-color="#FF6F00" />
      <stop offset="100%" stop-color="#AA6C00" />
    </linearGradient>

    <!-- Back Slope (Neutral reflection) -->
    <linearGradient id="gold-back-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FFD54F" />
      <stop offset="100%" stop-color="#FF8F00" />
    </linearGradient>
    
    <!-- Engraving Inner Shadow Dark Gold Color -->
    <linearGradient id="engrave-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5D3E00" />
      <stop offset="100%" stop-color="#AA771C" />
    </linearGradient>

    <!-- Premium outer neon glow for PWA icon -->
    <filter id="pwa-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Rounded App Icon Background with Luxury Gold Border -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" stroke="#FFC107" stroke-width="6" stroke-opacity="0.25" />

  <!-- Background decorative rings -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#gold-top-grad)" stroke-width="2" stroke-opacity="0.08" stroke-dasharray="10 6" />
  <circle cx="256" cy="256" r="180" fill="none" stroke="#FFA000" stroke-width="1" stroke-opacity="0.04" />

  <!-- 3D Gold Bar Stack / Single Main Gold Bar -->
  <g filter="url(#pwa-glow)">
    <!-- 1. Shadow for Gold Bar -->
    <polygon points="80,380 432,380 392,140 120,140" fill="black" opacity="0.4" filter="blur(15px)" />
    
    <!-- 2. Back Slope Face -->
    <polygon points="130,150 382,150 362,180 150,180" fill="url(#gold-back-grad)" />

    <!-- 3. Left Face -->
    <polygon points="130,150 150,180 130,320 90,370" fill="url(#gold-left-grad)" />

    <!-- 4. Right Face -->
    <polygon points="382,150 362,180 382,320 422,370" fill="url(#gold-right-grad)" />

    <!-- 5. Front Face -->
    <polygon points="130,320 382,320 422,370 90,370" fill="url(#gold-front-grad)" />

    <!-- 6. Top Face (Main reflective pane) -->
    <polygon points="150,180 362,180 382,320 130,320" fill="url(#gold-top-grad)" />

    <!-- 7. Glossy SPECULAR Reflection highlight overlay (Diagonal glossy slash) -->
    <polygon points="180,180 235,180 185,320 130,320" fill="#ffffff" opacity="0.15" />
    <polygon points="280,180 300,180 250,320 230,320" fill="#ffffff" opacity="0.08" />

    <!-- 8. ENGRAVED TEXTS AND EMBLEM ON TOP FACE -->
    <!-- Star Emblem at (256, 210) -->
    <path d="M 256 198 L 260 207 L 270 208 L 262 215 L 265 224 L 256 219 L 247 224 L 250 215 L 242 208 L 252 207 Z" fill="url(#engrave-grad)" />
    
    <!-- 999.9 Purity marking -->
    <text x="256" y="258" font-family="'Outfit', 'Inter', monospace, sans-serif" font-size="34" font-weight="900" fill="url(#engrave-grad)" text-anchor="middle" letter-spacing="4">999.9</text>
    
    <!-- FINE GOLD text -->
    <text x="256" y="286" font-family="'Outfit', 'Inter', sans-serif" font-size="16" font-weight="800" fill="url(#engrave-grad)" text-anchor="middle" letter-spacing="3" opacity="0.85">FINE GOLD</text>
    
    <!-- Serial number (makes it look like a real gold bar!) -->
    <text x="256" y="306" font-family="'Outfit', 'Inter', monospace, sans-serif" font-size="10" font-weight="700" fill="url(#engrave-grad)" text-anchor="middle" letter-spacing="1" opacity="0.7">No. HQ100999</text>
  </g>

  <!-- Luxury branding text outside the bar -->
  <text x="256" y="445" font-family="'Outfit', 'Inter', sans-serif" font-size="28" font-weight="900" fill="url(#gold-top-grad)" text-anchor="middle" letter-spacing="4" filter="url(#pwa-glow)">GOLDEN DIARY</text>
  <text x="256" y="475" font-family="'Outfit', 'Inter', sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="2" opacity="0.45">PREMIUM trading journal</text>
</svg>
